<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ============================================
         LAYER 1 — Basic SEO
         Muncul di tab browser & hasil pencarian Google
    ============================================ -->
    <title>Naufal Ar Rafizi — Software Generalist</title>
    <meta
      name="description"
      content="Portfolio of Naufal Ar Rafizi, a Software Generalist specializing in web and mobile application development. 8+ projects across frontend, backend, and mobile. Based in Indonesia."
    />
    <meta
      name="keywords"
      content="Naufal Ar Rafizi, software developer, web developer, mobile developer, fullstack developer, Next.js, NestJS, Kotlin, freelance developer Indonesia, freelance developer Bogor"
    />
    <meta name="author" content="Naufal Ar Rafizi" />

    <!-- ============================================
         LAYER 2 — Open Graph
         Mengontrol tampilan preview card saat link
         dibagikan di WhatsApp, LinkedIn, Telegram, dll.
    ============================================ -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://naufalarrafizi.my.id/" />
    <meta property="og:title" content="Naufal Ar Rafizi — Software Generalist" />
    <meta
      property="og:description"
      content="Web & mobile developer with 2 years experience across the full product lifecycle. Explore my projects and get in touch."
    />
    <!--
      og:image — Gambar preview saat link di-share
      WAJIB diganti setelah kamu buat og.image.png di Figma (1200x630px)
      dan upload ke folder public/
    -->
    <meta property="og:image" content="https://naufalarrafizi.my.id/og.image.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="Naufal Ar Rafizi Portfolio" />

    <!-- ============================================
         LAYER 2B — Twitter / X Card
         Khusus untuk tampilan preview di Twitter/X
    ============================================ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://naufalarrafizi.my.id/" />
    <meta name="twitter:title" content="Naufal Ar Rafizi — Software Generalist" />
    <meta
      name="twitter:description"
      content="Web & mobile developer with 2 years experience across the full product lifecycle."
    />
    <meta name="twitter:image" content="https://naufalarrafizi.my.id/og.image.png" />
    <!--
      Ganti @naufal_rfz dengan username Twitter/X kamu jika punya,
      atau hapus baris ini kalau tidak punya akun Twitter/X
    -->
    <meta name="twitter:creator" content="@naufal_rfz" />

    <!-- ============================================
         LAYER 3 — Canonical URL
         Mencegah duplikasi konten di mata Google
         ketika website-mu diakses dari berbagai URL
    ============================================ -->
    <link rel="canonical" href="https://naufalarrafizi.my.id/" />

    <!-- ============================================
         FAVICON
         Ganti dengan favicon milikmu sendiri
         Bisa generate di: favicon.io
    ============================================ -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
